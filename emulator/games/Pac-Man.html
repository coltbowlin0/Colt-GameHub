<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://media.gq.com/photos/5fbd3397fff3e5e56de13fc1/16:9/w_2240,c_limit/Riz_Playlist.jpg">
    <title>Pac-Man</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        #game-container {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        footer {
            text-align: center;
            background-color: #111;
            padding: 8px;
            font-size: 14px;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <footer>Licensed by Colt 45's Game Hub</footer>

    <script>
        function webretroEmbed(node, path, queries) {
            var frame = document.createElement("iframe");
            frame.style.width = "100%";
            frame.style.height = "100%";
            frame.style.border = "none";
            frame.id = "game-frame";

            if (queries.rom) {
                var link = document.createElement("a");
                // FIX: Since this file is in /games/, we go UP to find /roms/
                link.href = (/^(https?:)?\/\//i).test(queries.rom) ? queries.rom : "../roms/" + queries.rom;
                queries.rom = link.href;
            }

            var queryString = Object.entries(queries)
                .map(i => i.map(val => val && encodeURIComponent(val)))
                .map(i => i[1] ? i.join("=") : i[0])
                .join("&");

            frame.src = path + "?" + queryString;
            node.appendChild(frame);

            node.addEventListener('mousedown', function() {
                frame.focus();
            });

            return frame;
        }

        var container = document.getElementById('game-container');
        
        // FIX: Points to webretro.html in the same /games/ folder
        var path = 'webretro.html'; 
        
        var options = {
            core: 'autodetect',
            rom: 'pac-man.nes' 
        };

        webretroEmbed(container, path, options);
    </script>
</body>
</html>
