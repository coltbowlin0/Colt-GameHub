<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Who's Your Daddy?!</title>
    <link rel="icon" type="image/png" href="https://media.gq.com/photos/5fbd3397fff3e5e56de13fc1/16:9/w_2240,c_limit/Riz_Playlist.jpg">
    <style>
      /* This ensures the page itself doesn't have scrollbars or extra space */
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #231F20;
      }
      /* This makes the game canvas fill the whole screen */
      #unity-canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <script src="Build/daddyreeyuki.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";
      }

      createUnityInstance(canvas, {
        dataUrl: "Build/daddyreeyuki.data",
        frameworkUrl: "Build/daddyreeyuki.framework.js",
        codeUrl: "Build/daddyreeyuki.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Joe Williams",
        productName: "WhosYourDaddy",
        productVersion: "1.0",
        // Set this to true so the internal game resolution matches the window size
        matchWebGLToCanvasSize: true, 
        devicePixelRatio: window.devicePixelRatio || 1,
      });
    </script>
  </body>
</html>
