<!doctype html>
<html>
<head>

    <meta name="description" content="Go to any site even its blocked.">
    <meta charset="UTF-8">
    <meta name="description" content="Your journey to new skills starts here. Explore courses, tutorials, and resources for lifelong learners.">
    <title>degloved</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="../scram/scramjet.all.js"></script>
    <script src="../baremux/index.js"></script>
    <script src="../epoxy/index.js"></script>
    <style>
        .proxy-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .proxy-container {
            width: 500px;
            max-width: 90%;
            border: none;
        }

        #proxy-input {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 1rem;
            border-radius: 5px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .btn-row button {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: #888;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.15s;
        }

        .btn-row button:hover {
            background: rgba(255, 255, 255, 0.20);
            transform: translateY(-2px);
        }

        .search-engines {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .search-engines button {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.08);
            color: #888;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.15s;
        }

        .search-engines button:hover,
        .search-engines button.active {
            background: rgba(255, 255, 255, 0.20);
        }

        .quick-links {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 1rem;
        }

        .quick-links a {
            padding: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.15s;
        }

        .quick-links a:hover {
            background: rgba(255, 255, 255, 0.20);
            color: #d4d4d4;
            transform: translateY(-2px);
        }

        #proxy-error {
            color: #ff6b6b;
            margin-top: 1rem;
            text-align: center;
        }

        #proxy-error-code {
            color: #888;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            white-space: pre-wrap;
        }

        .proxy-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 9998;
            display: none;
        }

        .proxy-frame.active {
            display: block;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10000;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid #333;
            transform: translateY(-100%);
            transition: transform 0.25s ease;
            display: none;
        }

        .top-bar.visible {
            display: block;
        }

        .top-bar:hover,
        .top-bar.expanded {
            transform: translateY(0);
        }

        .top-bar-peek {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
            z-index: 10001;
            display: none;
            cursor: pointer;
            justify-content: center;
            align-items: center;
        }

        .top-bar-peek.visible {
            display: flex;
        }

        .top-bar-peek::after {
            content: '▼';
            font-size: 8px;
            color: rgba(255, 255, 255, 0.3);
            transition: opacity 0.15s;
        }

        .top-bar-peek:hover + .top-bar,
        .top-bar:hover {
            transform: translateY(0);
        }

        .top-bar-peek:hover::after,
        .top-bar.expanded + .top-bar-peek::after,
        .top-bar-peek.hidden-arrow::after {
            opacity: 0;
        }

        .tabs-container {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            gap: 5px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs-container::-webkit-scrollbar {
            display: none;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #1a1a1a;
            color: #888;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.15s;
            white-space: nowrap;
            max-width: 180px;
            border-radius: 4px;
        }

        .tab:hover {
            background: #2a2a2a;
            color: #d4d4d4;
        }

        .tab.active {
            background: #333;
            color: #e8e8e8;
        }

        .tab-title {
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }

        .tab-close {
            font-size: 14px;
            opacity: 0.6;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .tab-close:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }

        .new-tab-btn {
            padding: 8px 12px;
            background: #0a0a0a;
            color: #888;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.15s;
            border-radius: 4px;
        }

        .new-tab-btn:hover {
            background: #333;
            color: #d4d4d4;
        }

        .controls-row {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            gap: 8px;
            border-top: 1px solid #222;
        }

        .controls-row button {
            padding: 6px 12px;
            background: #1a1a1a;
            color: #d4d4d4;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.15s;
            border-radius: 4px;
        }

        .controls-row button:hover {
            background: #333;
        }

        .controls-row input {
            flex: 1;
            padding: 8px 12px;
            background: #1a1a1a;
            color: #d4d4d4;
            border: none;
            font-size: 0.9rem;
            border-radius: 4px;
        }

        .controls-row input:focus {
            outline: none;
            background: #222;
        }

        .home-link {
            padding: 6px 12px;
            background: #1a1a1a;
            color: #d4d4d4;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.15s;
            border-radius: 4px;
        }

        .home-link:hover {
            background: #333;
        }
        .go-btn{
            background: rgba(255, 255, 255, 0.08);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            display: none !important;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
        }

        .loading-overlay.active {
            display: flex !important;
            visibility: visible;
            opacity: 1;
        }

        .loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #888;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }


        @keyframes spin {
            to { transform: rotate(360deg); }
        }

    </style>
</head>

<body>
<canvas id="bg"></canvas>
<button class="clanker" type="button" onclick="go('/')">home</button>

<div class="loading-overlay" id="loading-overlay">
    <div class="loading-content">
        <div class="spinner"></div>
    </div>
</div>

<div class="top-bar-peek" id="top-bar-peek"></div>

<div class="top-bar" id="top-bar">
    <div class="tabs-container" id="tabs-container">
        <button class="new-tab-btn" id="add-tab-btn">+</button>
    </div>
    <div class="controls-row">
        <a href="/" class="home-link">home</a>
        <button id="ctrl-back">←</button>
        <button id="ctrl-forward">→</button>
        <button id="ctrl-refresh">↻</button>
        <input type="text" id="ctrl-url" placeholder="Enter URL or search...">
        <button id="ctrl-go">go</button>
    </div>
</div>

<div class="proxy-wrapper" id="proxy-wrapper">
    <div class="proxy-container">
        <h1 class="proxy-title">proxy</h1>
        <form id="proxy-form">
            <input type="text" id="proxy-input" placeholder="Enter URL or search..." autofocus>
            <div class="btn-row">
                <button class="go-btn" type="submit">go</button>
            </div>
        </form>
        <div class="search-engines">
            <button data-engine="https://www.google.com/search?q=%s" class="active">Google</button>
            <button data-engine="https://duckduckgo.com/?q=%s">DuckDuckGo</button>
            <button data-engine="https://www.bing.com/search?q=%s">Bing</button>
            <button data-engine="https://search.brave.com/search?q=%s">Brave</button>
        </div>
        <p id="proxy-error"></p>
        <pre id="proxy-error-code"></pre>
        <div class="quick-links">
            <a href="#" data-url="https://youtube.com">YouTube</a>
            <a href="#" data-url="https://discord.com/app">Discord</a>
            <a href="#" data-url="https://reddit.com">Reddit</a>
            <a href="#" data-url="https://twitch.tv">Twitch</a>
            <a href="#" data-url="https://twitter.com">Twitter</a>
            <a href="#" data-url="https://tiktok.com">TikTok</a>
            <a href="#" data-url="https://netflix.com">Netflix</a>
            <a href="#" data-url="https://spotify.com">Spotify</a>
            <a href="#" data-url="https://github.com">GitHub</a>
        </div>
    </div>
</div>

<div id="frames-container"></div>
<script src="../js/leave.js"></script>
<script src="../js/background.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var form = document.getElementById('proxy-form');
        var input = document.getElementById('proxy-input');
        var errorText = document.getElementById('proxy-error');
        var errorCode = document.getElementById('proxy-error-code');
        var proxyWrapper = document.getElementById('proxy-wrapper');
        var topBar = document.getElementById('top-bar');
        var topBarPeek = document.getElementById('top-bar-peek');
        var tabsContainer = document.getElementById('tabs-container');
        var addTabBtn = document.getElementById('add-tab-btn');
        var urlBar = document.getElementById('ctrl-url');
        var framesContainer = document.getElementById('frames-container');
        var homeBtn = document.querySelector('.clanker');
        var loadingOverlay = document.getElementById('loading-overlay');

        var tabs = [];
        var activeTabId = null;
        var nextTabId = 0;
        var searchEngine = 'https://www.google.com/search?q=%s';

        var scramjetData = window.$scramjetLoadController();
        var scramjet = new scramjetData.ScramjetController({
            files: {
                wasm: '/scram/scramjet.wasm.wasm',
                all: '/scram/scramjet.all.js',
                sync: '/scram/scramjet.sync.js'
            }
        });
        scramjet.init();

        var connection = new BareMux.BareMuxConnection('/baremux/worker.js');

        function showLoading() {
            loadingOverlay.classList.add('active');
        }

        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }

        async function registerServiceWorker() {
            if (!navigator.serviceWorker) {
                if (location.protocol !== 'https:' && !['localhost', '127.0.0.1'].includes(location.hostname)) {
                    throw new Error('Service workers require HTTPS.');
                }
                throw new Error('Your browser doesn\'t support service workers.');
            }
            await navigator.serviceWorker.register('/proxy-sw.js', { scope: '/scramjet/' });
        }

        function toUrl(text) {
            try { return new URL(text).toString(); } catch (e) {}
            try {
                var url = new URL('http://' + text);
                if (url.hostname.includes('.')) return url.toString();
            } catch (e) {}
            return searchEngine.replace('%s', encodeURIComponent(text));
        }

        function getHostname(url) {
            try { return new URL(url).hostname; } catch (e) { return 'New Tab'; }
        }

        function createTab(url, title) {
            var tab = { id: nextTabId++, url: url, title: title || 'New Tab', frame: null };
            tabs.push(tab);
            renderTabs();
            return tab;
        }

        function renderTabs() {
            tabsContainer.querySelectorAll('.tab').forEach(function (el) { el.remove(); });
            tabs.forEach(function (tab) {
                var el = document.createElement('div');
                el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
                el.innerHTML = '<span class="tab-title">' + tab.title + '</span><span class="tab-close">×</span>';
                el.addEventListener('click', function (e) {
                    if (!e.target.classList.contains('tab-close')) switchToTab(tab.id);
                });
                el.querySelector('.tab-close').addEventListener('click', function (e) {
                    e.stopPropagation();
                    closeTab(tab.id);
                });
                tabsContainer.insertBefore(el, addTabBtn);
            });
        }

        function switchToTab(tabId) {
            tabs.forEach(function (tab) {
                if (tab.frame) tab.frame.frame.classList.remove('active');
            });
            var tab = tabs.find(function (t) { return t.id === tabId; });
            if (tab && tab.frame) {
                tab.frame.frame.classList.add('active');
                urlBar.value = tab.url;
            }
            activeTabId = tabId;
            renderTabs();
        }

        function closeTab(tabId) {
            var index = tabs.findIndex(function (t) { return t.id === tabId; });
            if (index === -1) return;
            var tab = tabs[index];
            if (tab.frame) tab.frame.frame.remove();
            tabs.splice(index, 1);
            if (activeTabId === tabId) {
                if (tabs.length > 0) {
                    switchToTab(tabs[Math.max(0, index - 1)].id);
                } else {
                    activeTabId = null;
                    showHomeScreen(true);
                }
            }
            renderTabs();
        }

        function showHomeScreen(hideBar) {
            hideLoading();
            proxyWrapper.style.display = 'flex';
            homeBtn.style.display = 'block';
            tabs.forEach(function (tab) {
                if (tab.frame) tab.frame.frame.classList.remove('active');
            });
            activeTabId = null;
            renderTabs();
            if (hideBar) {
                topBar.classList.remove('visible');
                topBarPeek.classList.remove('visible');
            }
        }

        function hideHomeScreen() {
            proxyWrapper.style.display = 'none';
            homeBtn.style.display = 'none';
            topBar.classList.add('visible');
            topBarPeek.classList.add('visible');
        }

        async function loadUrl(url) {
            errorText.textContent = '';
            errorCode.textContent = '';
            showLoading();
            try { await registerServiceWorker(); } catch (err) {
                hideLoading();
                errorText.textContent = 'Failed to register service worker.';
                errorCode.textContent = err.toString();
                throw err;
            }
            try {
                var finalUrl = toUrl(url);
                var wispUrl = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host + '/';
                var transport = await connection.getTransport();
                if (transport !== '/epoxy/index.mjs') {
                    await connection.setTransport('/epoxy/index.mjs', [{ wisp: wispUrl }]);
                }
                var tab = createTab(finalUrl, getHostname(finalUrl));
                var frame = scramjet.createFrame();
                frame.frame.classList.add('proxy-frame');
                framesContainer.appendChild(frame.frame);
                frame.frame.addEventListener('load', function() {
                    hideLoading();
                });
                frame.go(finalUrl);
                tab.frame = frame;
                hideHomeScreen();
                switchToTab(tab.id);
            } catch (err) {
                hideLoading();
                throw err;
            }
        }

        async function navigateCurrentTab(url) {
            if (activeTabId === null) return;
            var tab = tabs.find(function (t) { return t.id === activeTabId; });
            if (!tab || !tab.frame) return;
            var finalUrl = toUrl(url);
            showLoading();
            tab.frame.frame.addEventListener('load', function onLoad() {
                hideLoading();
                tab.frame.frame.removeEventListener('load', onLoad);
            });
            tab.frame.go(finalUrl);
            tab.url = finalUrl;
            tab.title = getHostname(finalUrl);
            renderTabs();
            urlBar.value = finalUrl;
        }

        document.querySelectorAll('.search-engines button').forEach(function (btn) {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.search-engines button').forEach(function (b) { b.classList.remove('active'); });
                btn.classList.add('active');
                searchEngine = btn.dataset.engine;
            });
        });

        document.querySelectorAll('.quick-links a').forEach(function (link) {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                input.value = link.dataset.url;
                form.dispatchEvent(new Event('submit'));
            });
        });

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            await loadUrl(input.value);
        });

        addTabBtn.addEventListener('click', function () {
            hideLoading();
            proxyWrapper.style.display = 'flex';
            homeBtn.style.display = 'block';
            tabs.forEach(function (tab) {
                if (tab.frame) tab.frame.frame.classList.remove('active');
            });
            activeTabId = null;
            renderTabs();
            topBar.classList.add('visible');
            topBarPeek.classList.add('visible');
            input.focus();
        });

        document.getElementById('ctrl-back').addEventListener('click', function () {
            var tab = tabs.find(function (t) { return t.id === activeTabId; });
            if (tab && tab.frame) tab.frame.back();
        });

        document.getElementById('ctrl-forward').addEventListener('click', function () {
            var tab = tabs.find(function (t) { return t.id === activeTabId; });
            if (tab && tab.frame) tab.frame.forward();
        });

        document.getElementById('ctrl-refresh').addEventListener('click', function () {
            var tab = tabs.find(function (t) { return t.id === activeTabId; });
            if (tab && tab.frame) tab.frame.reload();
        });

        document.getElementById('ctrl-go').addEventListener('click', async function () {
            if (urlBar.value) await navigateCurrentTab(urlBar.value);
        });

        urlBar.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') document.getElementById('ctrl-go').click();
        });

        topBar.addEventListener('mouseenter', function () {
            topBarPeek.classList.add('hidden-arrow');
        });

        topBar.addEventListener('mouseleave', function () {
            topBarPeek.classList.remove('hidden-arrow');
        });

        var params = new URLSearchParams(window.location.search);
        var autoUrl = params.get('url');
        if (autoUrl) {
            input.value = autoUrl;
            loadUrl(autoUrl);
        }
    });
</script>
<script src="../js/settings.js"></script>
<script src="../js/panicbtn.js"></script>
<script src="../socket.io/socket.io.js"></script>
<script src="../js/socket-global.js"></script>
</body>
</html>
